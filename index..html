<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sachini & Navindu Wedding Invitation</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    background: #f7f4ef;
    font-family: Arial, sans-serif;
}

.container {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: relative;
}

.slider {
    display: flex;
    width: 300%;
    height: 100%;
    transition: transform 0.4s ease-in-out;
}

.slide {
    width: 100vw;
    height: 100vh;
    flex-shrink: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f7f4ef;
}

.slide img {
    max-width: 95%;
    max-height: 95%;
    object-fit: contain;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    border: none;
    background: rgba(0,0,0,0.4);
    color: white;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    font-size: 22px;
    cursor: pointer;
    z-index: 100;
}

.prev {
    left: 15px;
}

.next {
    right: 15px;
}

.dots {
    position: absolute;
    bottom: 25px;
    width: 100%;
    text-align: center;
}

.dot {
    height: 12px;
    width: 12px;
    margin: 0 5px;
    display: inline-block;
    border-radius: 50%;
    background: #c7c7c7;
    transition: 0.3s;
}

.dot.active {
    background: #b86b25;
}
</style>

</head>

<body>

<div class="container">

```
<button class="nav-btn prev" onclick="changeSlide(-1)">❮</button>
<button class="nav-btn next" onclick="changeSlide(1)">❯</button>

<div class="slider" id="slider">

    <div class="slide">
        <img src="cover.jpeg" alt="Cover">
    </div>

    <div class="slide">
        <img src="inside.jpeg" alt="Invitation">
    </div>

    <div class="slide">
        <img src="gift.jpeg" alt="Gift Note">
    </div>

</div>

<div class="dots">
    <span class="dot active"></span>
    <span class="dot"></span>
    <span class="dot"></span>
</div>
```

</div>

<script>

let currentSlide = 0;

const slider = document.getElementById('slider');
const dots = document.querySelectorAll('.dot');

function updateSlider() {
    slider.style.transform = `translateX(-${currentSlide * 100}vw)`;

    dots.forEach(dot => dot.classList.remove('active'));
    dots[currentSlide].classList.add('active');
}

function changeSlide(direction) {

    currentSlide += direction;

    if (currentSlide < 0) currentSlide = 0;
    if (currentSlide > 2) currentSlide = 2;

    updateSlider();
}

// Swipe support for mobile

let startX = 0;

document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
});

document.addEventListener('touchend', e => {

    let endX = e.changedTouches[0].clientX;
    let diff = startX - endX;

    if (diff > 50 && currentSlide < 2) {
        currentSlide++;
    }

    if (diff < -50 && currentSlide > 0) {
        currentSlide--;
    }

    updateSlider();
});

</script>

</body>
</html>
